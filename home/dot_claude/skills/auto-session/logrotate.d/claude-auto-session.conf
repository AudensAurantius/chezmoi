# claude-auto-session.conf — opt-in logrotate config for auto-session hook logs.
#
# Each auto-session directory accumulates a hook.log (one JSON record per
# hook started/ended). Over long sessions (or if many sessions live under
# the same parent dir) this can grow. This config rotates any hook.log
# under ~/Source/**/.auto-sessions/** and under ~/.cache/claude-auto-sessions/**.
#
# INSTALL (user-level via systemd):
#   cp logrotate.d/claude-auto-session.conf ~/.config/logrotate.d/
#   cp systemd/claude-auto-session-logrotate.{service,timer} ~/.config/systemd/user/
#   systemctl --user enable --now claude-auto-session-logrotate.timer
#
# INSTALL (system-level, if you prefer root logrotate):
#   sudo cp logrotate.d/claude-auto-session.conf /etc/logrotate.d/
#   # Adjust the glob paths to match where your sessions actually live.
#
# SAFETY: uses `copytruncate` — does not rename the live file, so an active
# nag-repeater or hook-wrapper process still writes to the same inode after
# rotation. Logs may briefly contain zero-byte gaps during the truncate
# itself; acceptable for JSONL audit logs.

# Adjust glob(s) below to match your actual session-dir layout.
/home/*/Source/**/.auto-sessions/*/hook.log
/home/*/.cache/claude-auto-sessions/*/hook.log
{
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    size 10M
    dateext
    dateformat -%Y%m%d
}
